<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        // Konfigurasi warna kustom
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#16213e',
                        secondary: '#0f3460',
                        accent: '#e94560',
                        light: '#f1f2f6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-shadow {
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 0 5px 15px rgba(0, 0, 0, 0.15);
            }
            .text-balance {
                text-wrap: balance;
            }
            .avatar-border {
                background: linear-gradient(45deg, #e94560, #ff9a76);
                padding: 3px;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-primary to-secondary min-h-screen flex items-center justify-center p-5 font-sans">
    <!-- Kartu Profil -->
    <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8 w-full max-w-sm card-shadow border border-white/10">
        <!-- Foto Profil -->
        <div class="flex justify-center mb-5">
            <div class="w-32 h-32 rounded-full avatar-border">
                <img 
                    src="https://cdn.discordapp.com/attachments/1280146210870661163/1496885687973052599/WhatsApp_Image_2026-04-23_at_21.39.36.jpeg?ex=69eb82ee&is=69ea316e&hm=0cdf87f620f7eb6f9807dea2dd5909fb030af9c4c47590c07968336a435b4765&" 
                    alt="Foto Profil" 
                    class="w-full h-full rounded-full object-cover"
                >
            </div>
        </div>

        <!-- Nama & Jurusan/Minat -->
        <div class="text-center mb-7">
            <h1 class="text-[clamp(1.5rem,3vw,1.8rem)] font-bold text-light mb-2">Clarisya jingga argany</h1>
            <p class="text-accent font-medium tracking-wider uppercase text-sm">BOGA</p>
        </div>

        <!-- Informasi Data -->
        <div class="bg-secondary/40 rounded-xl p-5 mb-7 space-y-3 border border-white/5">
            <div class="flex justify-between items-center">
                <span class="text-light/70 text-sm">Kelas</span>
                <span class="text-light font-semibold">10</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-light/70 text-sm">Hobby</span>
                <span class="text-light font-semibold">Badminton</span>
            </div>
        </div>

        <!-- Ikon Sosmed -->
        <div class="flex justify-center">
            <!-- Ganti bagian href="" ini dengan link akun Instagram kamu -->
            <a 
                href="https://www.instagram.com/clarisyaanakbaikk/?utm_source=ig_web_button_share_sheet" 
                target="_blank"
                rel="noopener noreferrer"
                class="w-12 h-12 rounded-full bg-accent/20 hover:bg-accent flex items-center justify-center text-accent hover:text-white transition-all duration-300 transform hover:scale-110"
                aria-label="Instagram"
            >
                <i class="fa fa-instagram text-xl"></i>
            </a>
        </div>
    </div>
</body>
</html>
